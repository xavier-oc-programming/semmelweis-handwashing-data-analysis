name: Publish Notebook

on:
  push:
    branches:
      - main
    paths:
      - 'notebooks/analysis/semmelweis_handwashing_analysis.ipynb'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert

      - name: Convert notebook to HTML
        run: |
          mkdir -p notebook_web_render
          jupyter nbconvert --to html \
            --no-input \
            --output-dir notebook_web_render \
            --output index.html \
            notebooks/analysis/semmelweis_handwashing_analysis.ipynb

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: notebook_web_render
          destination_dir: notebook_web_render
          keep_files: true
